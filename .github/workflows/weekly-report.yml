name: Weekly Report

on:
  schedule:
    # Every Monday at 6am ET (11:00 UTC during EDT, 10:00 UTC during EST)
    - cron: '0 11 * * 1'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Verify code version
        run: head -30 scripts/pull-data.js

      # Pull fresh data from Google Ads
      - name: Pull data
        run: npm run pull
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}

      # Generate and send optimization email
      - name: Send email
        run: npm run email
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

      # Build static dashboards
      - name: Build dashboards
        run: npm run build

      # Commit data snapshots back to repo (preserves history)
      - name: Commit data
        run: |
          git config user.name "LocalEyes Reports Bot"
          git config user.email "reports@localeyespro.com"
          git pull --rebase origin main || true
          git add data/
          git diff --staged --quiet || git commit -m "data: weekly snapshot $(date +%Y-%m-%d)"
          git push

      # Deploy to Cloudflare Pages
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create localeyes-reports --production-branch main || true
      - name: Deploy pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=localeyes-reports --commit-dirty=true
